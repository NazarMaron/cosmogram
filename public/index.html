<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CosmoGram</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-container">
        <h2>COSMOGRAM</h2>
        <input id="username" type="text" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <br><br>
        <button id="login-btn">Log In</button>
        <button id="register-btn" style="background: #6a0dad; color: white;">Register</button>
    </div>

    <div id="chat-container" style="display: none; flex-direction: row; width: 700px; height: 550px;">
        <div style="width: 230px; border-right: 1px solid #00f2ff; padding: 10px; display: flex; flex-direction: column;">
            
            <div style="text-align: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333;">
                <img id="my-avatar" src="" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #00f2ff;">
                <div id="my-name-display" style="color: white; font-weight: bold; margin-top: 5px;"></div>
                
                <input type="file" id="avatar-input" style="display: none;" accept="image/*">
                <button id="change-avatar-btn" style="background: transparent; color: #00f2ff; border: 1px solid #00f2ff; font-size: 10px; cursor: pointer; border-radius: 3px; margin-top: 5px; padding: 3px 8px;">Change Photo</button>
            </div>

            <div style="display: flex; margin-bottom: 15px;">
                <input id="add-friend-input" type="text" placeholder="Add username..." style="flex-grow: 1; padding: 5px; border-radius: 3px; border: none; background: #222; color: white;">
                <button id="add-friend-btn" style="background: #00f2ff; color: black; border: none; cursor: pointer; padding: 5px 10px; margin-left: 5px; border-radius: 3px; font-weight: bold;">+</button>
            </div>

            <p style="font-size: 12px; color: #aaa; margin: 0 0 5px 0;">Your Friends</p>
            <ul id="user-list" style="list-style: none; padding: 0; color: white; cursor: pointer; overflow-y: auto; flex-grow: 1;"></ul>

            <button id="logout-btn" style="background: #ff4444; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px;">Logout</button>
        </div>
        
        <div style="flex-grow: 1; display: flex; flex-direction: column;">
            <div id="chat-header" style="padding: 10px; border-bottom: 1px solid #444; color: #00f2ff; font-weight: bold; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px;">
                Select a friend to chat
            </div>
            <ul id="messages" style="flex-grow: 1; padding: 15px; overflow-y: auto; list-style: none; margin: 0;"></ul>
            <form id="form" style="display: flex; padding: 10px; border-top: 1px solid #444;">
                <input id="input" autocomplete="off" placeholder="Type a message..." style="flex-grow: 1; padding: 10px; border-radius: 5px; border: none; background: #222; color: white; margin-right: 5px;" disabled />
                <button id="send-btn" style="padding: 10px; border-radius: 5px; border: none; background: #555; color: black; font-weight: bold;" disabled>Send</button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
